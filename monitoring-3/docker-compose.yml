
services:
  mimir:
    image: grafana/mimir:latest
    restart: unless-stopped
    container_name: mimir
    command: ["-config.file=/etc/mimir.yaml"]
    volumes:
      - ./etc/mimir.yaml:/etc/mimir.yaml
      - mimir-data:/data
    ports:
      - "9009:9009"
    networks:
      - obs-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - obs-net

  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    user: root
    volumes:
      - ./etc/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
    networks:
      - obs-net

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./etc/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - obs-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.79.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"] 
    ports:
      - "4317:4317"
      # - "4318:4318"
      - "8888:8888"
      - "8889:8889"
      - "13133:13133"
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_started
      mimir:
        condition: service_started
      node-exporter:
        condition: service_started
    volumes:
      - ./etc/otel-collector-config.yaml:/etc/otel-collector-config.yaml 
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - obs-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_started
      mimir:
        condition: service_started
      node-exporter:
        condition: service_started
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./etc/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor,traceToMetrics,traceToLogs,explicitId
    networks:
      - obs-net

volumes:
  grafana-storage:
  tempo-data:
  loki-data:
  mimir-data:

networks:
  obs-net:
    external: true
