apiVersion: 1

datasources:
  - name: mimir
    type: prometheus
    uid: mimir
    url: http://mimir:9009/prometheus

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    jsonData:
      httpMethod: GET
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: mimir
      tracesToLogsV2:
        datasourceUid: loki
        groupFilters: []
        filterByTraceID: true
        filterBySpanID: false

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: 'trace[_-]?id["=: ]+(\w+)'
          name: TraceID
          url: "$${__value.raw}"
