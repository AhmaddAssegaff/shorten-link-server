server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    block:
      bloom_filter_false_positive_rate: 0.05
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/traces

compactor:
  compaction:
    block_retention: 24h
