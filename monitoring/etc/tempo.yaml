server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
        http:

ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  trace_idle_period: 1m
  max_block_duration: 5m

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/traces
    blocklist_poll: 5m
    maintenance_interval: 5m

search_enabled: true

compactor:
  compaction:
    block_retention: 24h

overrides:
  defaults:
    ingestion:
      max_traces_per_user: 10000
