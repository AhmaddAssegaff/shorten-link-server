services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "${JENKINS_PORT}:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
    restart: always
    networks:
      - mgmt-net

volumes:
  jenkins_data:

networks:
  mgmt-net:
    external: true
