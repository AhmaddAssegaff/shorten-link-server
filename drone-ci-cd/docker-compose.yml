services:
  drone-server:
    image: drone/drone:2
    container_name: drone-server
    environment:
      - DRONE_GITHUB_CLIENT_ID=${DRONE_GITHUB_CLIENT_ID}
      - DRONE_GITHUB_CLIENT_SECRET=${DRONE_GITHUB_CLIENT_SECRET}
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}
      - DRONE_SERVER_HOST=${DRONE_SERVER_HOST}
      - DRONE_SERVER_PROTO=${DRONE_SERVER_PROTO}
      - DRONE_USER_CREATE=username:${DEFAULT_DRONE_USER_GITHUB},admin:true
      - DRONE_DATABASE_DRIVER=sqlite3
      - DRONE_DATABASE_DATASOURCE=/data/drone.sqlite
    ports:
      - "${DRONE_SERVER_PORT_HTTP}:80"
      - "${DRONE_SERVER_PORT_HTTPS}:443"
    volumes:
      - /var/lib/drone:/data
    restart: unless-stopped
    networks:
      - mgmt-net
      - public-net

  drone-runner:
    image: drone/drone-runner-docker:1
    container_name: drone-runner
    depends_on:
      - drone-server
    environment:
      - DRONE_RPC_PROTO=${DRONE_SERVER_PROTO_RUNNER}
      - DRONE_RPC_HOST=${DRONE_SERVER_HOST_RUNNER}
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}
      - DRONE_RUNNER_CAPACITY=${DRONE_RUNNER_CAPACITY}
      - DRONE_RUNNER_NAME=${DRONE_RUNNER_NAME}
    ports:
      - "${DRONE_RUNNER_PORT}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - public-net

networks:
  mgmt-net:
    external: true
  public-net:
    external: true
