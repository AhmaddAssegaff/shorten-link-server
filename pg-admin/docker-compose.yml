services:
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "0.0.0.0:5050:80"
    networks:
      - backend-net
      - mgmt-net

networks:
  backend-net:
    external: true
  mgmt-net:
    external: true
